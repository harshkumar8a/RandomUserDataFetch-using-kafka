version: '3.8'

services:

  # CONTROLLERS 
  kafka-controller-1:
    image: apache/kafka:3.8.1
    container_name: kafka-controller-1

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    networks:
      - harshkumar

    volumes:
      - controller_data_1:/var/lib/kafka/data


  kafka-controller-2:
    image: apache/kafka:3.8.1
    container_name: kafka-controller-2

    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    networks:
      - harshkumar

    volumes:
      - controller_data_2:/var/lib/kafka/data


  kafka-controller-3:
    image: apache/kafka:3.8.1
    container_name: kafka-controller-3

    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    networks:
      - harshkumar

    volumes:
      - controller_data_3:/var/lib/kafka/data


  # BROKERS 
  kafka-broker-1:
    image: apache/kafka:3.8.1
    container_name: kafka-broker-1

    ports:
      - "29092:9092"

    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:19092,PLAINTEXT_HOST://localhost:29092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    depends_on:
      - kafka-controller-1
      - kafka-controller-2
      - kafka-controller-3

    networks:
      - harshkumar

    volumes:
      - broker_data_1:/var/lib/kafka/data


  kafka-broker-2:
    image: apache/kafka:3.8.1
    container_name: kafka-broker-2

    ports:
      - "39092:9092"

    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:19092,PLAINTEXT_HOST://localhost:39092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    depends_on:
      - kafka-controller-1
      - kafka-controller-2
      - kafka-controller-3

    networks:
      - harshkumar

    volumes:
      - broker_data_2:/var/lib/kafka/data


  kafka-broker-3:
    image: apache/kafka:3.8.1
    container_name: kafka-broker-3

    ports:
      - "49092:9092"

    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:19092,PLAINTEXT_HOST://localhost:49092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller-1:9093,2@kafka-controller-2:9093,3@kafka-controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    depends_on:
      - kafka-controller-1
      - kafka-controller-2
      - kafka-controller-3

    networks:
      - harshkumar

    volumes:
      - broker_data_3:/var/lib/kafka/data


  # SCHEMA REGISTRY 
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.1
    container_name: schema-registry

    ports:
      - "18081:8081"

    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-broker-1:19092,PLAINTEXT://kafka-broker-2:19092,PLAINTEXT://kafka-broker-3:19092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3

    networks:
      - harshkumar


  # KAFKA UI 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:19092,kafka-broker-2:19092,kafka-broker-3:19092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

    depends_on:
      - kafka-broker-1
      - schema-registry

    networks:
      - harshkumar



# NETWORK 
networks:
  harshkumar:
    driver: bridge


# VOLUMES 
volumes:
  controller_data_1:
  controller_data_2:
  controller_data_3:
  broker_data_1:
  broker_data_2:
  broker_data_3:
